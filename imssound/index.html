<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Sonidos - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1e293b; color: #f8f9fa; }
        .banner { background-color: #334155; padding: 2rem; border-bottom: 4px solid #0ea5e9; margin-bottom: 2rem; text-align: center; }
        .btn-sonido { height: 100px; font-weight: 600; border: none; transition: transform 0.2s; }
        .btn-sonido:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<header class="banner">
    <h1>Tablero de Sonidos para IMSSFieles</h1>
    <p class="lead">Haz clic en los botones para reproducir los sonidos.</p>
</header>

<div class="container pb-5">
    <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-primary w-100 btn-sonido" data-sound="./audio/sonido2.mp4">CHECADOR 1 ✅</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-secondary w-100 btn-sonido" data-sound="./audio/sonido2.mp3">CHECADOR 2</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-success w-100 btn-sonido" data-sound="./audio/sonido3.mp3">SONIDO DE OFICINA</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-danger w-100 btn-sonido" data-sound="./audio/sonido5.mp4">MONTACARGAS ✅</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-sonido" data-sound="./audio/sonido6.mp3">MONTACARGAS 2 ✅</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-info w-100 btn-sonido" data-sound="./audio/sonido6.mp3">TRAILER DE REVERSA</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-light w-100 btn-sonido" data-sound="./audio/sonido4.mp4">MICROONDAS ✅</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-dark w-100 btn-sonido" data-sound="./audio/sonido8.mp3" style="color:white; border: 1px solid #555;">IMPRESORA</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-primary w-100 btn-sonido" data-sound="./audio/sonido3.mp4">TECLADO ✅</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-success w-100 btn-sonido" data-sound="./audio/sonido10.mp3">TELEFONO</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-sonido" data-sound="./audio/sonido11.mp3">PENDIENTE</button></div>
        <div class="col-6 col-md-4 col-lg-3"><button class="btn btn-info w-100 btn-sonido" data-sound="./audio/sonido12.mp3">PENDIENTE</button></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $('.btn-sonido').on('click', function() {
        new Audio($(this).data('sound')).play();
    });
</script>
</body>
</html>
